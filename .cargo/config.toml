[build]
target-dir = "rust/target"

# Android 15+ requires app-native shared libraries to be compatible with 16 KB pages.
# Keep the linker flag in repo config so local builds, Gradle sync scripts, and CI all align.
[target.aarch64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.x86_64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]
