name: Native CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: 1.88.0

concurrency:
  group: native-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android Build And Unit Test
    runs-on: ubuntu-24.04
    env:
      ANDROID_NDK_VERSION: 28.2.13676358

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK packages
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Install Rust toolchain and Android targets
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add aarch64-linux-android x86_64-linux-android

      - name: Run Android debug unit tests and debug build
        working-directory: native/android-app
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_VERSION: ${{ env.ANDROID_NDK_VERSION }}
        run: ./gradlew clean testDebugUnitTest assembleDebug

      - name: Run Android release build
        working-directory: native/android-app
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_VERSION: ${{ env.ANDROID_NDK_VERSION }}
        run: ./gradlew clean assembleRelease

  ios:
    name: iOS Build And Unit Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain and iOS targets
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec native/ios-app/project.yml

      - name: Run iOS unit tests
        shell: bash
        run: |
          set -euo pipefail
          readarray -t sim_selection < <(
            python3 - <<'PY'
            import json
            import subprocess

            devicetypes = json.loads(
                subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "-j"])
            )["devicetypes"]
            runtimes = json.loads(
                subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "-j"])
            )["runtimes"]

            device_type_id = next(
                (
                    item["identifier"]
                    for item in devicetypes
                    if item.get("name", "").startswith("iPhone ")
                ),
                None,
            )

            ios_runtimes = [
                item
                for item in runtimes
                if item.get("isAvailable")
                and item.get("identifier", "").startswith(
                    "com.apple.CoreSimulator.SimRuntime.iOS-"
                )
            ]
            ios_runtimes.sort(
                key=lambda item: tuple(
                    int(part) for part in item.get("version", "0").split(".")
                ),
            )
            runtime_id = ios_runtimes[-1]["identifier"] if ios_runtimes else None

            if not device_type_id:
                raise SystemExit("no available iPhone simulator device type found")
            if not runtime_id:
                raise SystemExit("no available iOS simulator runtime found")

            print(device_type_id)
            print(runtime_id)
            PY
          )
          device_type_id="${sim_selection[0]}"
          runtime_id="${sim_selection[1]}"
          sim_id="$(xcrun simctl create Fire-CI "$device_type_id" "$runtime_id")"
          trap 'xcrun simctl delete "$sim_id"' EXIT
          xcrun simctl boot "$sim_id" || true
          xcrun simctl bootstatus "$sim_id" -b
          xcodebuild \
            -project native/ios-app/Fire.xcodeproj \
            -scheme Fire \
            -destination "id=$sim_id" \
            -derivedDataPath /tmp/fire-ios-tests \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Build iOS app for device
        run: |
          xcodebuild \
            -project native/ios-app/Fire.xcodeproj \
            -scheme Fire \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath /tmp/fire-ios-release \
            CODE_SIGNING_ALLOWED=NO \
            build
