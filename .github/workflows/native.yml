name: Native CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_TOOLCHAIN: 1.88.0

concurrency:
  group: native-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android Build And Unit Test
    runs-on: ubuntu-24.04
    env:
      ANDROID_NDK_VERSION: 28.2.13676358

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Verify required submodules are initialized and clean
        shell: bash
        run: ./scripts/check_clean_submodules.sh

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v5

      - uses: android-actions/setup-android@v4

      - name: Install Android SDK and NDK packages
        shell: bash
        run: |
          set -euo pipefail
          packages=()
          [[ -d "${ANDROID_SDK_ROOT}/platform-tools" ]] || packages+=("platform-tools")
          [[ -d "${ANDROID_SDK_ROOT}/platforms/android-35" ]] || packages+=("platforms;android-35")
          [[ -d "${ANDROID_SDK_ROOT}/build-tools/35.0.0" ]] || packages+=("build-tools;35.0.0")
          [[ -d "${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" ]] || packages+=("ndk;${ANDROID_NDK_VERSION}")

          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "Android SDK and NDK packages already present"
            exit 0
          fi

          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "${packages[@]}"

      - name: Install Rust toolchain and Android targets
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add aarch64-linux-android x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}
          workspaces: |
            . -> rust/target

      - name: Run Android debug unit tests and debug build
        working-directory: native/android-app
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_VERSION: ${{ env.ANDROID_NDK_VERSION }}
        run: ./gradlew clean testDebugUnitTest assembleDebug

      - name: Run Android release build
        working-directory: native/android-app
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_VERSION: ${{ env.ANDROID_NDK_VERSION }}
        run: ./gradlew assembleRelease

  ios:
    name: iOS Validation
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Verify required submodules are initialized and clean
        shell: bash
        run: ./scripts/check_clean_submodules.sh

      - name: Install Rust toolchain and iOS targets
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}
          workspaces: |
            . -> rust/target

      - name: Install XcodeGen
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
          else
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate --spec native/ios-app/project.yml

      - name: Verify generated Xcode project is up to date
        run: git diff --exit-code -- native/ios-app/Fire.xcodeproj

      - name: Run iOS tests
        shell: bash
        run: |
          set -euo pipefail
          sim_selection="$(
            python3 -c 'import json, subprocess; devicetypes = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "-j"]))["devicetypes"]; runtimes = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "-j"]))["runtimes"]; device_type_id = next((item["identifier"] for item in devicetypes if item.get("name", "").startswith("iPhone ")), ""); ios_runtimes = [item for item in runtimes if item.get("isAvailable") and item.get("identifier", "").startswith("com.apple.CoreSimulator.SimRuntime.iOS-")]; ios_runtimes.sort(key=lambda item: tuple(int(part) for part in item.get("version", "0").split("."))); runtime_id = ios_runtimes[-1]["identifier"] if ios_runtimes else ""; print(device_type_id); print(runtime_id)'
          )"
          device_type_id="$(printf '%s\n' "$sim_selection" | sed -n '1p')"
          runtime_id="$(printf '%s\n' "$sim_selection" | sed -n '2p')"
          test -n "$device_type_id" || { echo "no available iPhone simulator device type found" >&2; exit 1; }
          test -n "$runtime_id" || { echo "no available iOS simulator runtime found" >&2; exit 1; }
          sim_id="$(xcrun simctl create Fire-CI "$device_type_id" "$runtime_id")"
          trap 'xcrun simctl delete "$sim_id"' EXIT
          xcrun simctl boot "$sim_id" || true
          xcrun simctl bootstatus "$sim_id" -b
          run_tests() {
            local test_identifier="$1"

            xcodebuild \
              -project native/ios-app/Fire.xcodeproj \
              -scheme Fire \
              -destination "id=$sim_id" \
              -derivedDataPath /tmp/fire-ios-tests \
              CODE_SIGNING_ALLOWED=NO \
              -only-testing:"$test_identifier" \
              test
          }

          run_tests FireTests

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            run_tests "FireUITests/FireSmokeUITests/testAppLaunches"
          fi

      - name: Build iOS app for device
        if: github.event_name == 'push'
        run: |
          xcodebuild \
            -project native/ios-app/Fire.xcodeproj \
            -scheme Fire \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath /tmp/fire-ios-release \
            CODE_SIGNING_ALLOWED=NO \
            build
