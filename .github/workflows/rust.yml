name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: 1.88.0

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Rust Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component rustfmt --component clippy
          rustup default "${RUST_TOOLCHAIN}"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy -p fire-models -p fire-core -p fire-uniffi --all-targets --no-deps -- -D warnings

  host-test:
    name: Rust Host Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-latest
          - macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"

      - name: Run workspace tests
        shell: bash
        run: cargo test -p fire-models -p fire-core -p fire-uniffi --all-targets

  android-cross-build:
    name: Rust Android Cross Build
    runs-on: ubuntu-24.04
    env:
      ANDROID_NDK_VERSION: 28.2.13676358

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add aarch64-linux-android x86_64-linux-android

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Build fire-uniffi for Android
        shell: bash
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -euo pipefail
          android_ndk_root="${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          toolchain_prebuilt_dir="$(find "$android_ndk_root/toolchains/llvm/prebuilt" -mindepth 1 -maxdepth 1 -type d | sort | head -n 1)"
          toolchain_bin_dir="$toolchain_prebuilt_dir/bin"
          llvm_ar="$toolchain_bin_dir/llvm-ar"

          export CC_aarch64_linux_android="$toolchain_bin_dir/aarch64-linux-android26-clang"
          export CXX_aarch64_linux_android="$toolchain_bin_dir/aarch64-linux-android26-clang++"
          export AR_aarch64_linux_android="$llvm_ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CC_aarch64_linux_android"

          export CC_x86_64_linux_android="$toolchain_bin_dir/x86_64-linux-android26-clang"
          export CXX_x86_64_linux_android="$toolchain_bin_dir/x86_64-linux-android26-clang++"
          export AR_x86_64_linux_android="$llvm_ar"
          export CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER="$CC_x86_64_linux_android"

          cargo build -p fire-uniffi --target aarch64-linux-android --release
          cargo build -p fire-uniffi --target x86_64-linux-android --release

  ios-cross-build:
    name: Rust iOS Cross Build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Build fire-uniffi for iOS
        shell: bash
        run: |
          cargo rustc -p fire-uniffi --lib --target aarch64-apple-ios --release --crate-type staticlib
          cargo rustc -p fire-uniffi --lib --target aarch64-apple-ios-sim --release --crate-type staticlib
          cargo rustc -p fire-uniffi --lib --target x86_64-apple-ios --release --crate-type staticlib
