name: Fire
options:
  minimumXcodeGenVersion: 2.45.3
settings:
  base:
    SWIFT_VERSION: 5.10
    CODE_SIGN_STYLE: Automatic
targets:
  Fire:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Sources/FireAppSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fire.app.ios
        PRODUCT_NAME: Fire
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Fire
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) FIRE_USE_UNIFFI_STUBS"
