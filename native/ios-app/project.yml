name: Fire
options:
  minimumXcodeGenVersion: 2.45.3
schemes:
  Fire:
    build:
      targets:
        Fire: all
        FireTests:
          - test
    test:
      gatherCoverageData: true
      targets:
        - name: FireTests
          parallelizable: true
          randomExecutionOrder: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
targets:
  Fire:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Sources/FireAppSession
      - path: Generated/fire_uniffi.swift
        optional: true
        buildPhase: sources
    dependencies:
      - sdk: Security.framework
      - sdk: Foundation.framework
      - sdk: CoreFoundation.framework
      - sdk: libiconv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fire.app.ios
        PRODUCT_NAME: Fire
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Fire
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers:
          - com.fire.app.ios.notification-alert-refresh
        INFOPLIST_KEY_UIBackgroundModes:
          - fetch
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Generated/lib/$(PLATFORM_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lfire_uniffi"
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Generated"
    preBuildScripts:
      - path: scripts/sync_uniffi_bindings.sh
        name: Sync Fire UniFFI Bindings
        shell: /bin/bash
        showEnvVars: false
        basedOnDependencyAnalysis: true
        inputFiles:
          - $(SRCROOT)/scripts/sync_uniffi_bindings.sh
          - $(SRCROOT)/../../Cargo.toml
          - $(SRCROOT)/../../Cargo.lock
          - $(SRCROOT)/../../rust
          - $(SRCROOT)/../../third_party/openwire
          - $(SRCROOT)/../../third_party/xlog-rs
          - $(SRCROOT)/../../rust/crates/fire-uniffi/uniffi.toml
        outputFiles:
          - $(SRCROOT)/Generated/fire_uniffi.swift
          - $(SRCROOT)/Generated/fire_uniffiFFI/fire_uniffiFFI.h
          - $(SRCROOT)/Generated/fire_uniffiFFI/module.modulemap
          - $(SRCROOT)/Generated/lib/$(PLATFORM_NAME)/libfire_uniffi.a
  FireTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/Unit
    dependencies:
      - target: Fire
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Generated"
